<nav class="w3-sidebar w3-bar-block w3-medium w3-hide-small w3-center w3-black">
  <!-- Avatar image in top left corner -->
    <img src="assets/images/reynaldocv.jpg " style="width:80%; padding:40px">

    {% assign sorted_sections = site.sections | sort: "sort_by_number" %}
    {% for section in sorted_sections %}     
    <a href="#{{section.id}}" class="w3-bar-item w3-button w3-padding-large w3-hover-black">
      <i class="fa {{section.icon}} w3-large">  {{section.short}}  </i>
    </a>      
    {% endfor %}

      
  
</nav>
